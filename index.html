<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catacombs of the Forgotten</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-wrap">
    <header id="topbar">
      <h1>Catacombs of the Forgotten</h1>
      <div id="stats"></div>
    </header>

    <div id="stage">
      <canvas id="game"></canvas>
      <canvas id="minimap" title="Map"></canvas>

      <div id="overlay" class="hidden">
        <div id="overlay-card">
          <h2 id="overlay-title"></h2>
          <p id="overlay-text"></p>
          <button id="overlay-btn">Begin</button>
        </div>
      </div>
    </div>

    <div id="log" aria-live="polite"></div>

    <footer id="help">
      <span>Move / Attack: <b>Arrows</b> or <b>WASD</b></span>
      <span>Wait: <b>Space</b></span>
      <span>Descend: step onto the <b>stairs</b></span>
      <span>Restart: <b>R</b></span>
      <span id="audio-controls">
        <button id="mute-btn" type="button" title="Mute / unmute">🔊</button>
        <button id="settings-btn" type="button" title="Settings" aria-haspopup="true">⚙</button>
      </span>
    </footer>

    <div id="settings-panel" class="hidden">
      <h3>Settings</h3>
      <label>Master <input id="vol-master" type="range" min="0" max="100" /></label>
      <label>Music <input id="vol-music" type="range" min="0" max="100" /></label>
      <label>SFX <input id="vol-sfx" type="range" min="0" max="100" /></label>
      <label class="check"><input id="opt-shake" type="checkbox" /> Screen shake</label>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
